<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading Workspace | StellarSync</title>
  <meta name="description" content="Loading your StellarSync workspace.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" href="../icon/stellarsync-apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../icon/stellarsync-192.png">
  <link rel="shortcut icon" href="../icon/stellarsync-192.png">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #f7f2ff;
      background:
        radial-gradient(circle at 20% 20%, rgba(157, 78, 221, 0.18), transparent 28rem),
        radial-gradient(circle at 80% 12%, rgba(0, 240, 255, 0.10), transparent 30rem),
        #0a0612;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .card {
      width: min(100%, 440px);
      padding: 34px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      background: rgba(18, 12, 29, 0.88);
      box-shadow: 0 30px 90px rgba(0,0,0,0.42);
    }
    img {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      box-shadow: 0 0 28px rgba(199, 125, 255, 0.32);
    }
    h1 { margin: 18px 0 8px; font-size: 28px; line-height: 1.1; }
    p { margin: 0 0 22px; color: #9ca3af; line-height: 1.55; }
    a {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 14px;
      color: white;
      background: linear-gradient(135deg, #9d4edd, #c77dff);
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="../icon/stellarsync-192.png" alt="StellarSync">
    <h1>Loading workspace...</h1>
    <p>StellarSync is preparing your workspace gateway.</p>
    <!-- TODO: check Supabase user. -->
    <!-- TODO: look up workspace and route to the correct app workspace. -->
    <a href="/client/algorithmwitch.html?workspace=gpe">Launch Workspace</a>
  </main>
</body>
</html>
