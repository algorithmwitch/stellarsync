        :root {
            --color-bg: #0a0612;
            --color-accent: #a855f7;
            --panel-bg: #120c1d;
            --panel-border: rgba(255, 255, 255, 0.04);
            --glow-purple: rgba(157, 78, 221, 0.3);
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: var(--color-bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img, svg, video, canvas, .login-card { max-width: 100%; }

        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle var(--duration) ease-in-out infinite; animation-delay: var(--delay); }
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--opacity); transform: scale(1.3); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        .login-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 1.5rem;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 20px var(--glow-purple);
            backdrop-blur: 10px;
        }

        .login-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 1.5rem;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(157,78,221,0.2), rgba(255,255,255,0.05));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: #181125;
            border: 1px solid var(--panel-border);
            border-radius: 0.75rem;
            padding: 12px 14px 12px 42px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.1);
            background: #1c142d;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to r, #9d4edd, #c77dff);
            color: white;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-radius: 0.75rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(157, 78, 221, 0.4);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-primary:disabled {
            cursor: wait;
            opacity: 0.75;
            transform: none;
        }
        .login-error {
            margin: -0.35rem 0 0.85rem;
            color: #fca5a5;
            font-size: 12px;
            line-height: 1.4;
            min-height: 1rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }
        .checkbox-custom {
            width: 18px;
            height: 18px;
            background: #181125;
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        input:checked + .checkbox-custom {
            background: #a855f7;
            border-color: #a855f7;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 18px;
        }
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: #e2e8f0;
        }

        .logo-glow {
            filter: drop-shadow(0 0 10px rgba(199, 125, 255, 0.5));
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            .login-card { padding: 1.5rem; }
            button, a { white-space: normal; text-align: center; }
        }

<body vid="11">
    
    <div class="fixed inset-0 z-0 pointer-events-none" vid="12">
        <div class="absolute inset-0 bg-gradient-to-br from-[#0a0514] via-[#05020a] to-[#0a0514]" vid="13"></div>
        <div class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] bg-purple-600/10 rounded-full blur-[150px]" vid="14"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-cyan-600/10 rounded-full blur-[150px]" vid="15"></div>
        <div id="stars-container" class="stars absolute inset-0" vid="16"></div>
    </div>

    <main class="login-card" vid="17">
        <div class="flex flex-col items-center mb-8" vid="18">
            <div class="w-14 h-14 rounded-2xl bg-[#231738] flex items-center justify-center mb-4 logo-glow overflow-hidden" vid="19">
                <img src="../icon/stellarsync-192.png" alt="StellarSync" class="w-full h-full object-cover" vid="20">
            </div>
            <h1 id="login-title" class="text-3xl font-bold text-white tracking-tight mb-1" vid="21">StellarSync</h1>
            <p id="login-subtitle" class="text-gray-500 text-xs font-medium tracking-widest uppercase" vid="22">Where content meets the cosmos</p>
        </div>

        <div id="invite-banner" class="hidden mb-5 rounded-2xl border border-[#a855f7]/30 bg-[#181125] px-4 py-3 text-left">
            <div class="text-[10px] font-bold uppercase tracking-[0.2em] text-[#c77dff]">Workspace Invite</div>
            <div id="invite-banner-copy" class="mt-1 text-sm text-gray-200">Sign in or create your password to join this workspace.</div>
        </div>

        <form id="login-form" method="post" action="javascript:void(0)" onsubmit="return false;" class="space-y-4" vid="23">
            <div class="input-group" vid="24">
                <i class="ph-bold ph-at input-icon" vid="25"></i>
                <input type="email" id="login-email" name="email" autocomplete="email" placeholder="Signal frequency (Email)" class="form-input" required="" vid="26">
            </div>

            <div class="input-group" vid="27">
                <i class="ph-bold ph-lock input-icon" vid="28"></i>
                <input type="password" id="login-password" name="password" autocomplete="current-password" placeholder="Secure passphrase" class="form-input" required="" vid="29">
                <i class="ph-bold ph-eye toggle-password" id="password-toggle" onclick="togglePasswordVisibility()" vid="30"></i>
            </div>

            <div class="flex items-center justify-between mb-8" vid="31">
                <label class="checkbox-container" vid="32">
                    <input type="checkbox" class="hidden" vid="33">
                    <div class="checkbox-custom" vid="34">
                        <i class="ph-bold ph-check text-white text-[10px]" vid="35"></i>
                    </div>
                    <span class="text-xs text-gray-400 font-medium" vid="36">Remember this constellation</span>
                </label>
                <a id="login-secondary-link" href="/contact/" class="text-xs text-[#c77dff] font-semibold hover:text-white transition-colors" vid="37">Forgot passphrase?</a>
            </div>

            <p id="login-error" class="login-error" role="alert" aria-live="polite" vid="37a"></p>

            <button type="button" id="login-button" class="btn-primary" vid="38">
                Login
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 text-center" vid="39">
            <p class="text-xs text-gray-500 font-medium" vid="40">
                New to the system? <a id="login-signup-link" href="/sign-up/" class="text-[#c77dff] hover:text-white font-bold ml-1 transition-colors" vid="41">Initialize frequency</a>
            </p>
        </div>
	    </main>
    <footer class="fixed bottom-5 left-0 right-0 z-10 text-center">
        <a href="https://thealgorithmwitch.com/services" class="text-xs text-gray-500 hover:text-[#c77dff] font-semibold transition-colors">Services</a>
    </footer>

	    <script vid="42">
        const starsContainer = document.getElementById('stars-container');
        const shouldRenderStars = !window.matchMedia || !window.matchMedia('(max-width: 640px)').matches;
        if (starsContainer && shouldRenderStars) {
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            const size = Math.random() < 0.1 ? 3 : (Math.random() < 0.3 ? 2 : 1);
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${2 + Math.random() * 5}s`);
            star.style.setProperty('--delay', `${Math.random() * 5}s`);
            star.style.setProperty('--opacity', `${0.1 + Math.random() * 0.4}`);
            starsContainer.appendChild(star);
        }
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('login-password');
            const passwordToggle = document.getElementById('password-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordToggle.classList.remove('ph-eye');
                passwordToggle.classList.add('ph-eye-slash');
            } else {
                passwordInput.type = 'password';
                passwordToggle.classList.remove('ph-eye-slash');
                passwordToggle.classList.add('ph-eye');
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
          const SUPABASE_URL = "https://szdlvyzjeqkfxsoqltwg.supabase.co";
          const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6ZGx2eXpqZXFrZnhzb3FsdHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTE1NjcsImV4cCI6MjA5Njg2NzU2N30.9GT0oJqPcmrc9VSb-ZN0FtWy6i7SLTHBuzRQ9gvxnX0";
          const supabase = SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase
            ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
            : null;
          const form = document.getElementById("login-form");
          const emailInput = document.getElementById("login-email");
          const passwordInput = document.getElementById("login-password");
          const loginButton = document.getElementById("login-button");
          const errorEl = document.getElementById("login-error");
          const loginTitle = document.getElementById("login-title");
          const loginSubtitle = document.getElementById("login-subtitle");
          const inviteBanner = document.getElementById("invite-banner");
          const inviteBannerCopy = document.getElementById("invite-banner-copy");
          const signupLink = document.getElementById("login-signup-link");
          const secondaryLink = document.getElementById("login-secondary-link");
          const params = new URLSearchParams(window.location.search || "");
          const inviteToken = String(params.get("invite_token") || "").trim();
          const inviteEmail = String(params.get("email") || "").trim();
          const hasInvite = !!inviteToken;
          let loginInFlight = false;

          function buildInviteQuery() {
            const inviteParams = new URLSearchParams();
            if (inviteToken) inviteParams.set("invite_token", inviteToken);
            if (inviteEmail) inviteParams.set("email", inviteEmail);
            return inviteParams.toString();
          }

          if (hasInvite) {
            const inviteRoute = "/login/invite/" + (buildInviteQuery() ? "?" + buildInviteQuery() : "");
            if (!window.location.pathname.includes("/login/invite/")) {
              window.location.replace(inviteRoute);
              return;
            }
          }

          if (hasInvite) {
            if (loginTitle) loginTitle.textContent = "Join your workspace";
            if (loginSubtitle) loginSubtitle.textContent = "Sign in or create your password to accept the invite";
            if (inviteBanner) inviteBanner.classList.remove("hidden");
            if (inviteBannerCopy) inviteBannerCopy.textContent = inviteEmail
              ? `You’ve been invited to join a StellarSync workspace as ${inviteEmail}.`
              : "You’ve been invited to join a StellarSync workspace.";
            if (inviteEmail && emailInput) {
              emailInput.value = inviteEmail;
              emailInput.readOnly = true;
              emailInput.setAttribute("aria-readonly", "true");
            }
            if (signupLink) {
              signupLink.textContent = "Create your password";
              signupLink.href = "/sign-up/" + (buildInviteQuery() ? "?" + buildInviteQuery() : "");
            }
            if (secondaryLink) {
              secondaryLink.textContent = "Need help?";
              secondaryLink.href = "/contact/";
            }
          }

          console.log("[login] script loaded");

          if (!form || !emailInput || !passwordInput || !loginButton || !errorEl) {
            console.error("[login] Missing login form elements");
            return;
          }
          console.log("[login] elements found", { form, emailInput, passwordInput, loginButton, errorEl });

          async function handleLogin(event) {
            event?.preventDefault();
            event?.stopPropagation();

            if (errorEl) errorEl.textContent = "";

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
              if (errorEl) errorEl.textContent = "Enter your email and password.";
              return;
            }

            if (!supabase) {
              console.error("[login] auth error", "Supabase client unavailable");
              if (errorEl) errorEl.textContent = "Login is not configured. Please contact support.";
              return;
            }

            if (loginInFlight) return;
            loginInFlight = true;
            loginButton.disabled = true;
            loginButton.textContent = "Logging in...";

            try {
              console.log("[login] auth started");
              try { console.time("[boot] auth"); } catch (_) {}
              const { data, error } = await supabase.auth.signInWithPassword({
                email,
                password,
              });
              try { console.timeEnd("[boot] auth"); } catch (_) {}

              if (error) {
                console.error("[login] auth error", error);
                if (errorEl) errorEl.textContent = error.message || "Login failed.";
                return;
              }

              console.log("[login] auth success", data?.user?.email);
              if (hasInvite) {
                var inviteTarget = "/login/invite/" + (buildInviteQuery() ? "?" + buildInviteQuery() : "");
                window.location.assign(inviteTarget);
                return;
              }
              window.location.assign("/app/index.html");
            } catch (error) {
              try { console.timeEnd("[boot] auth"); } catch (_) {}
              console.error("[login] auth error", error);
              if (errorEl) errorEl.textContent = error?.message || "Login failed.";
            } finally {
              loginInFlight = false;
              loginButton.disabled = false;
              loginButton.textContent = "Login";
            }
          }

          loginButton.addEventListener("click", (event) => {
            console.log("[login] button clicked");
            handleLogin(event);
          });

          form.addEventListener("submit", (event) => {
            console.log("[login] submit intercepted");
            handleLogin(event);
          });

          [emailInput, passwordInput].forEach((input) => {
            input.addEventListener("keydown", (event) => {
              if (event.key !== "Enter") return;
              event.preventDefault();
              event.stopPropagation();
              console.log("[login] enter intercepted");
              handleLogin(event);
            });
          });

          document.addEventListener("submit", (event) => {
            if (event.target && event.target.id === "login-form") {
              event.preventDefault();
              event.stopPropagation();
              console.log("[login] submit intercepted");
              handleLogin(event);
            }
          }, true);
        });
    </script>
