<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accept Invite | StellarSync</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0612;
      --panel: #120c1d;
      --panel-2: #181125;
      --border: rgba(255,255,255,0.08);
      --text: #f5ecff;
      --muted: #a79abf;
      --accent: #a855f7;
      --accent-2: #c77dff;
      --danger: #fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(168,85,247,0.14), transparent 32%),
        linear-gradient(180deg, #08050d 0%, #0a0612 100%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--accent-2);
    }
    h1 {
      margin: 14px 0 8px;
      font-size: 32px;
      line-height: 1.08;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }
    .stack { display: grid; gap: 16px; }
    .field {
      display: grid;
      gap: 8px;
      margin-top: 18px;
    }
    .label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .input {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      padding: 13px 14px;
      color: var(--text);
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 13px 16px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }
    .btn-secondary {
      background: var(--panel-2);
      color: var(--text);
      border-color: var(--border);
    }
    .status {
      margin-top: 18px;
      min-height: 22px;
      font-size: 13px;
      color: var(--muted);
    }
    .status.error { color: var(--danger); }
    .hidden { display: none !important; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(168,85,247,0.1);
      border: 1px solid rgba(168,85,247,0.18);
      color: #e9d5ff;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .notice {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(252,165,165,0.24);
      background: rgba(127,29,29,0.18);
      color: #fecaca;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">StellarSync Invite</div>
    <h1 id="invite-title">Join your workspace</h1>
    <p id="invite-copy">Accept your invite and continue into StellarSync.</p>
    <p id="invite-meta" style="margin-top:10px;color:#cfc2e8;"></p>

    <div style="margin-top:18px" class="stack">
      <div class="pill" id="invite-role-pill">Pending invite</div>
      <div class="field">
        <label class="label" for="invite-email">Invited email</label>
        <input id="invite-email" class="input" type="email" readonly>
      </div>
    </div>

    <div class="actions" id="invite-auth-actions">
      <a id="invite-login-link" class="btn btn-primary" href="/login/">Sign in</a>
      <a id="invite-signup-link" class="btn btn-secondary" href="/sign-up/">Create password</a>
    </div>

    <div id="invite-failure-box" class="notice hidden">
      <div id="invite-failure-copy">This invite could not be opened.</div>
      <div class="actions" style="margin-top:14px;">
        <a class="btn btn-secondary" href="/login/">Back to login</a>
      </div>
    </div>

    <div class="status" id="invite-status"></div>
  </main>

  <script>
    (function () {
      const SUPABASE_URL = "https://szdlvyzjeqkfxsoqltwg.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN6ZGx2eXpqZXFrZnhzb3FsdHdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTE1NjcsImV4cCI6MjA5Njg2NzU2N30.9GT0oJqPcmrc9VSb-ZN0FtWy6i7SLTHBuzRQ9gvxnX0";
      const EDGE_URL = SUPABASE_URL.replace(/\/+$/, "") + "/functions/v1/workspace-members";
      const ACTIVE_WORKSPACE_KEY = "STELLARSYNC_ACTIVE_WORKSPACE";
      const params = new URLSearchParams(window.location.search || "");
      const inviteToken = String(params.get("invite_token") || "").trim();
      let inviteEmail = String(params.get("email") || "").trim();
      const supabase = window.supabase?.createClient
        ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
        : null;

      const titleEl = document.getElementById("invite-title");
      const copyEl = document.getElementById("invite-copy");
      const metaEl = document.getElementById("invite-meta");
      const rolePillEl = document.getElementById("invite-role-pill");
      const emailEl = document.getElementById("invite-email");
      const statusEl = document.getElementById("invite-status");
      const actionsEl = document.getElementById("invite-auth-actions");
      const failureBoxEl = document.getElementById("invite-failure-box");
      const failureCopyEl = document.getElementById("invite-failure-copy");
      const loginLink = document.getElementById("invite-login-link");
      const signupLink = document.getElementById("invite-signup-link");
      let acceptInFlight = false;
      let invitePreviewValid = false;

      function setStatus(message, isError) {
        if (!statusEl) return;
        statusEl.textContent = message || "";
        statusEl.classList.toggle("error", !!isError);
      }

      function buildInviteQuery() {
        const query = new URLSearchParams();
        if (inviteToken) query.set("invite_token", inviteToken);
        if (inviteEmail) query.set("email", inviteEmail);
        return query.toString();
      }

      function getAppRedirect(result) {
        const workspaceSlug = String(result?.workspace_slug || "").trim();
        const workspaceId = String(result?.workspace_id || "").trim();
        if (workspaceSlug) {
          return "/app/index.html?workspace=" + encodeURIComponent(workspaceSlug);
        }
        if (workspaceId) {
          return "/app/index.html?workspace_id=" + encodeURIComponent(workspaceId);
        }
        throw new Error("Invite accepted but workspace routing is missing.");
      }

      function storeActiveWorkspace(result) {
        const workspaceId = String(result?.workspace_id || "").trim();
        const workspaceSlug = String(result?.workspace_slug || "").trim();
        const workspaceName = String(result?.workspace_name || workspaceSlug || workspaceId || "").trim();
        if (!workspaceId && !workspaceSlug) return;
        const config = {
          id: workspaceId,
          slug: workspaceSlug,
          name: workspaceName
        };
        try {
          sessionStorage.setItem(ACTIVE_WORKSPACE_KEY, JSON.stringify(config));
        } catch (_) {}
      }

      function showFailure(message) {
        if (actionsEl) actionsEl.classList.add("hidden");
        if (failureBoxEl) failureBoxEl.classList.remove("hidden");
        if (failureCopyEl) failureCopyEl.textContent = message || "This invite could not be opened.";
        setStatus("", false);
      }

      async function callWorkspaceMembers(payload, accessToken) {
        const headers = {
          "Content-Type": "application/json",
          apikey: SUPABASE_ANON_KEY
        };
        if (accessToken) headers.Authorization = "Bearer " + accessToken;
        const response = await fetch(EDGE_URL, {
          method: "POST",
          headers,
          body: JSON.stringify(payload)
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data?.ok === false) {
          throw new Error(data?.error || data?.message || ("Invite request failed (" + response.status + ")"));
        }
        return data;
      }

      async function previewInvite() {
        if (!inviteToken) {
          showFailure("Invite token missing. Ask your workspace admin to send a fresh invite.");
          return;
        }
        if (emailEl) {
          emailEl.value = inviteEmail;
          emailEl.readOnly = true;
        }
        const query = buildInviteQuery();
        if (loginLink) loginLink.href = "/login/" + (query ? "?" + query : "");
        if (signupLink) signupLink.href = "/sign-up/" + (query ? "?" + query : "");
        try {
          const result = await callWorkspaceMembers({
            action: "preview_invite",
            invite_token: inviteToken
          });
          const invite = result?.invite || {};
          const workspaceName = String(invite.workspace_name || "your workspace").trim();
          const role = String(invite.role || "member").trim();
          const inviterLabel = String(invite.inviter_email || invite.admin_email || "").trim();
          inviteEmail = String(invite.email || inviteEmail || "").trim();
          const query = buildInviteQuery();
          if (loginLink) loginLink.href = "/login/" + (query ? "?" + query : "");
          if (signupLink) signupLink.href = "/sign-up/" + (query ? "?" + query : "");
          if (titleEl) titleEl.textContent = "You’ve been invited to join " + workspaceName + " on StellarSync.";
          if (copyEl) {
            copyEl.textContent = "Sign in or create your password to accept this workspace invite.";
          }
          if (metaEl) metaEl.textContent = inviterLabel ? "Invited by " + inviterLabel : "Invited by the workspace admin.";
          if (rolePillEl) {
            rolePillEl.textContent = role + " invite";
          }
          if (emailEl && !emailEl.value) emailEl.value = String(invite.email || inviteEmail || "").trim();
          invitePreviewValid = true;
        } catch (err) {
          showFailure(err?.message || "Could not load invite.");
        }
      }

      async function acceptInvite(session) {
        if (!inviteToken || acceptInFlight) return;
        if (!session?.access_token) {
          setStatus("Sign in or create your password to continue.", false);
          return;
        }
        acceptInFlight = true;
        if (actionsEl) actionsEl.classList.add("hidden");
        if (failureBoxEl) failureBoxEl.classList.add("hidden");
        setStatus("Accepting your invite...");
        try {
          const result = await callWorkspaceMembers({
            action: "accept_invite",
            invite_token: inviteToken
          }, session.access_token);
          storeActiveWorkspace(result);
          window.location.replace(getAppRedirect(result));
        } catch (err) {
          acceptInFlight = false;
          if (actionsEl) actionsEl.classList.remove("hidden");
          showFailure(err?.message || "Invite acceptance failed.");
        }
      }

      async function boot() {
        await previewInvite();
        if (!invitePreviewValid) return;
        if (!supabase) {
          showFailure("Supabase is not configured for invite acceptance.");
          return;
        }
        const { data } = await supabase.auth.getSession().catch(() => ({ data: { session: null } }));
        if (data?.session) {
          await acceptInvite(data.session);
          return;
        }
        setStatus("Sign in or create your password to accept this invite.");
        supabase.auth.onAuthStateChange(async function (event, session) {
          if (event === "SIGNED_IN" && session) {
            await acceptInvite(session);
          }
        });
      }

      boot();
    })();
  </script>
</body>
</html>
