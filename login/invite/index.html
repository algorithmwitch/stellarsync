        :root {

            --glow-purple: rgba(157, 78, 221, 0.25);
        }

        html, body {

            margin: 0;
            background-color: var(--color-bg);
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle var(--duration) ease-in-out infinite; animation-delay: var(--delay); }
        @keyframes twinkle {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: var(--opacity); transform: scale(1.3); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        .glass-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.6), 0 0 30px var(--glow-purple);
            position: relative;
            z-index: 10;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 2.5rem;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(157,78,221,0.25), rgba(255,255,255,0.06));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .glow-btn {
            background: var(--gradient-primary);
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glow-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 35px rgba(157, 78, 221, 0.5);
            filter: brightness(1.1);
        }

        .input-group:focus-within i {
            color: #c77dff;
        }

        .custom-checkbox {
            appearance: none;
            width: 18px;
            height: 18px;
            background: #0a0612;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }
        .custom-checkbox:checked {
            background: #a855f7;
            border-color: #a855f7;
        }
        .custom-checkbox:checked::after {
            content: "\f270";
            font-family: "Phosphor-Bold";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 10px;
        }

        .reveal { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.8s forwards; }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: white;

<body class="flex items-center justify-center p-4" vid="11">

    <div id="stars-container" class="stars" vid="12"></div>

    <div class="fixed inset-0 z-0 pointer-events-none" vid="13">
        <div class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] bg-purple-600/10 rounded-full blur-[150px]" vid="14"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-cyan-600/10 rounded-full blur-[150px]" vid="15"></div>
    </div>

    <main class="w-full max-w-lg reveal" vid="16">
        <div class="glass-card rounded-[2.5rem] p-10 md:p-12 overflow-hidden" vid="17">
            
            <div class="flex flex-col items-center text-center mb-10" vid="18">
                <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-purple-500 to-cyan-400 flex items-center justify-center shadow-2xl mb-6 ring-4 ring-white/5" vid="19">
                    <i class="ph-fill ph-planet text-white text-4xl" vid="20"></i>
                </div>
                <p class="text-xs font-bold text-gray-500 uppercase tracking-[0.3em] mb-3" vid="21">You've been invited to your</p>
                <h1 class="text-3xl md:text-4xl font-extrabold text-white leading-tight mb-3" id="workspaceName" vid="22">StellarSync Workspace</h1>
                <div class="flex items-center gap-2 text-sm text-gray-500" vid="23">
                    <i class="ph ph-user-circle-plus" vid="24"></i>
                    <span vid="25">by support@stellarsync.app</span>
                </div>
            </div>

            <div class="h-px w-full bg-gradient-to-r from-transparent via-white/10 to-transparent mb-10" vid="26"></div>

            <div class="mb-6" vid="27">
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-6 flex items-center gap-2" vid="28">
                    <i class="ph-bold ph-id-card text-purple-400" vid="29"></i>
                    Accept your invitation
                </h2>
                
                <form id="inviteForm" class="space-y-6" vid="30">
                    <div class="space-y-2" vid="31">
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wider ml-1" vid="32">Full Name</label>
                        <div class="relative input-group" vid="33">
                            <i class="ph-bold ph-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 transition-colors" vid="34"></i>
                            <input type="text" required="" placeholder="Enter your full name" class="w-full bg-[#0a0612] border border-white/10 rounded-xl py-3.5 pl-11 pr-4 text-white text-sm focus:outline-none focus:border-purple-500/50 transition-all placeholder:text-gray-700" vid="35">
                        </div>
                    </div>

                    <div class="space-y-2" vid="36">
                        <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wider ml-1" vid="37">Create Password</label>
                        <div class="relative input-group" vid="38">
                            <i class="ph-bold ph-lock-simple absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 transition-colors" vid="39"></i>
                            <input id="passwordInput" type="password" required="" placeholder="••••••••" class="w-full bg-[#0a0612] border border-white/10 rounded-xl py-3.5 pl-11 pr-12 text-white text-sm focus:outline-none focus:border-purple-500/50 transition-all placeholder:text-gray-700" vid="40">
                            <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors" vid="41">
                                <i id="passwordIcon" class="ph-bold ph-eye" vid="42"></i>
                            </button>
                        </div>
                        <p class="text-[10px] text-gray-600 ml-1 italic" vid="43">At least 8 characters</p>
                    </div>

                    <div class="flex items-start gap-3 px-1" vid="44">
                        <div class="pt-0.5" vid="45">
                            <input type="checkbox" required="" id="terms" class="custom-checkbox" vid="46">
                        </div>
                        <label for="terms" class="text-xs text-gray-400 leading-relaxed cursor-pointer" vid="47">
                            I agree to the <a href="#" class="text-purple-400 hover:underline" vid="48">Terms of Service</a> and <a href="#" class="text-purple-400 hover:underline" vid="49">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="glow-btn w-full py-4 mt-4 rounded-2xl text-white text-xs font-bold uppercase tracking-[0.2em] flex items-center justify-center gap-3" vid="50">
                        Enter Workspace
                        <i class="ph-bold ph-arrow-right text-lg" vid="51"></i>
                    </button>
                </form>
            </div>

            <div class="h-px w-full bg-gradient-to-r from-transparent via-white/5 to-transparent my-8" vid="52"></div>

            <div class="text-center space-y-6" vid="53">
                <div vid="54">
                    <p class="text-sm text-gray-500 mb-4" vid="55">Already have a StellarSync account?</p>
                    <button class="w-full py-3.5 rounded-xl border border-white/10 bg-white/5 text-white text-xs font-bold uppercase tracking-widest hover:bg-white/10 transition-all flex items-center justify-center gap-3" vid="56">
                        <i class="ph-bold ph-sign-in text-lg" vid="57"></i>
                        Log In Instead
                    </button>
                </div>

                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-amber-500/5 border border-amber-500/10" vid="58">
                    <i class="ph-fill ph-clock-countdown text-amber-500" vid="59"></i>
                    <span class="text-[10px] font-bold text-amber-500/80 uppercase tracking-wider" vid="60">Invite expires in 7 days</span>
                </div>
                
                <p class="text-[10px] text-gray-600 leading-relaxed max-w-xs mx-auto" vid="61">
                    This invitation was sent securely. If you weren't expecting this, you can safely ignore this email.
                </p>
            </div>
        </div>
    </main>

    <script vid="62">
        const starsContainer = document.getElementById('stars-container');
        const starCount = 200;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            const size = Math.random() < 0.1 ? 3 : (Math.random() < 0.3 ? 2 : 1);
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.setProperty('--duration', `${2 + Math.random() * 5}s`);
            star.style.setProperty('--delay', `${Math.random() * 5}s`);
            star.style.setProperty('--opacity', `${0.1 + Math.random() * 0.4}`);
            starsContainer.appendChild(star);
        }

        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('passwordIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('ph-eye');
                icon.classList.add('ph-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('ph-eye-slash');
                icon.classList.add('ph-eye');
            }
        }

        
        const urlParams = new URLSearchParams(window.location.search);
        const nameParam = urlParams.get('workspace');
        if (nameParam) {
            document.getElementById('workspaceName').innerText = nameParam;
        }

        document.getElementById('inviteForm').onsubmit = (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="ph-bold ph-spinner animate-spin text-lg"></i>';
            btn.disabled = true;
            
            setTimeout(() => {
                
                window.location.href = '/dashboard';
            }, 2000);
        };
    </script>
